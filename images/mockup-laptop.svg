<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 648" fill="none">
  <defs>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#DDDAD6"/>
      <stop offset="60%"  stop-color="#C8C4C0"/>
      <stop offset="100%" stop-color="#B8B4B0"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C4C0BC"/>
      <stop offset="100%" stop-color="#AAAAA6"/>
    </linearGradient>
    <linearGradient id="photo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ECEAE6"/>
      <stop offset="50%"  stop-color="#E0DDD8"/>
      <stop offset="100%" stop-color="#D4D0CA"/>
    </linearGradient>
    <clipPath id="sc">
      <rect x="42" y="18" width="876" height="534"/>
    </clipPath>
  </defs>

  <!-- ===== LID ===== -->
  <rect x="18" y="0" width="924" height="572" rx="12" fill="url(#lid)"/>
  <!-- top edge highlight -->
  <rect x="19" y="1" width="922" height="3" rx="1" fill="rgba(255,255,255,0.28)"/>
  <!-- bezel -->
  <rect x="38" y="14" width="884" height="542" rx="6" fill="#131318"/>
  <!-- screen glass -->
  <rect x="42" y="18" width="876" height="534" fill="#FAF7F5"/>
  <!-- camera -->
  <circle cx="480" cy="8" r="4" fill="#2C2C2E"/>
  <circle cx="479" cy="7.5" r="1.4" fill="#3C3C3E"/>

  <!-- ===== SCREEN CONTENT ===== -->
  <g clip-path="url(#sc)">

    <!-- Navbar -->
    <rect x="42" y="18" width="876" height="46" fill="rgba(250,247,245,0.97)"/>
    <line x1="42" y1="64" x2="918" y2="64" stroke="#E8E4E0" stroke-width="1"/>
    <!-- Logo A mark -->
    <polygon points="70,27 78,27 60,54 52,54" fill="#7A7570"/>
    <polygon points="70,27 78,27 94,54 86,54" fill="#7A7570"/>
    <!-- Logo text -->
    <rect x="104" y="29" width="64" height="8"  rx="4" fill="#2D2A30" opacity="0.70"/>
    <rect x="104" y="41" width="46" height="5"  rx="2.5" fill="#7A7570" opacity="0.48"/>
    <!-- Nav links -->
    <rect x="638" y="38" width="25" height="5" rx="2.5" fill="#B4AEB4"/>
    <rect x="675" y="38" width="25" height="5" rx="2.5" fill="#B4AEB4"/>
    <rect x="712" y="38" width="25" height="5" rx="2.5" fill="#B4AEB4"/>
    <rect x="749" y="38" width="25" height="5" rx="2.5" fill="#B4AEB4"/>
    <!-- CTA nav button -->
    <rect x="787" y="28" width="80" height="26" rx="13" fill="#1C1C1E"/>
    <rect x="800" y="36" width="54" height="5" rx="2.5" fill="white" opacity="0.62"/>

    <!-- Hero right: interior photo area -->
    <rect x="436" y="64" width="482" height="488" fill="url(#photo)"/>
    <!-- Sofa body -->
    <rect x="476" y="354" width="398" height="178" rx="18" fill="#D6D2CE" opacity="0.88"/>
    <!-- Sofa armrests -->
    <rect x="492" y="308" width="78" height="58" rx="10" fill="#CCCAC6" opacity="0.88"/>
    <rect x="778" y="308" width="78" height="58" rx="10" fill="#CCCAC6" opacity="0.88"/>
    <!-- Floor shadow under sofa -->
    <ellipse cx="675" cy="362" rx="164" ry="22" fill="#DDD9D5" opacity="0.65"/>
    <!-- Pampas: stem -->
    <rect x="862" y="154" width="8" height="308" rx="3" fill="#BEB9B4" opacity="0.72"/>
    <!-- Pampas: heads -->
    <ellipse cx="866" cy="130" rx="40" ry="80"  fill="#CEC6BA" opacity="0.36"/>
    <ellipse cx="848" cy="118" rx="26" ry="54"  fill="#C6BDB2" opacity="0.33"/>
    <ellipse cx="882" cy="136" rx="30" ry="66"  fill="#CABDB2" opacity="0.33"/>
    <!-- Window light suggestion -->
    <rect x="436" y="64" width="4" height="488" fill="rgba(255,255,255,0.06)"/>

    <!-- Hero left: copy -->
    <!-- Eyebrow pill -->
    <rect x="66" y="84" width="86" height="18" rx="9" fill="rgba(255,111,143,0.10)"/>
    <rect x="78" y="90" width="62" height="5"  rx="2.5" fill="#FF6F8F" opacity="0.82"/>
    <!-- H1 line 1 -->
    <rect x="66" y="114" width="288" height="17" rx="4" fill="#2D2A30" opacity="0.84"/>
    <!-- H1 line 2 (pink) -->
    <rect x="66" y="140" width="242" height="17" rx="4" fill="#FF6F8F" opacity="0.88"/>
    <!-- H1 line 3 -->
    <rect x="66" y="166" width="264" height="17" rx="4" fill="#2D2A30" opacity="0.84"/>
    <!-- Body text -->
    <rect x="66" y="198" width="260" height="7"  rx="3.5" fill="#9A8A9A" opacity="0.64"/>
    <rect x="66" y="212" width="218" height="7"  rx="3.5" fill="#9A8A9A" opacity="0.58"/>
    <!-- Primary CTA button (pink pill) -->
    <rect x="66" y="238" width="132" height="36" rx="18" fill="#FF6F8F"/>
    <rect x="82"  y="252" width="100" height="7"  rx="3.5" fill="white" opacity="0.78"/>
    <!-- Secondary CTA link -->
    <rect x="212" y="251" width="84" height="7"  rx="3.5" fill="#2D2A30" opacity="0.27"/>
    <!-- Stats row: 3 white cards -->
    <rect x="66"  y="298" width="80" height="56" rx="10" fill="white" opacity="0.70"/>
    <rect x="160" y="298" width="80" height="56" rx="10" fill="white" opacity="0.70"/>
    <rect x="254" y="298" width="80" height="56" rx="10" fill="white" opacity="0.70"/>
    <!-- Icon squares -->
    <rect x="78"  y="310" width="16" height="16" rx="4" fill="#FF6F8F" opacity="0.36"/>
    <rect x="172" y="310" width="16" height="16" rx="4" fill="#4A4A4A" opacity="0.18"/>
    <rect x="266" y="310" width="16" height="16" rx="4" fill="#FF6F8F" opacity="0.28"/>
    <!-- Label lines -->
    <rect x="78"  y="332" width="48" height="5"  rx="2.5" fill="#2D2A30" opacity="0.60"/>
    <rect x="78"  y="342" width="58" height="4"  rx="2"   fill="#9A9A9A" opacity="0.50"/>
    <rect x="172" y="332" width="48" height="5"  rx="2.5" fill="#2D2A30" opacity="0.60"/>
    <rect x="172" y="342" width="58" height="4"  rx="2"   fill="#9A9A9A" opacity="0.50"/>
    <rect x="266" y="332" width="48" height="5"  rx="2.5" fill="#2D2A30" opacity="0.60"/>
    <rect x="266" y="342" width="58" height="4"  rx="2"   fill="#9A9A9A" opacity="0.50"/>

  </g>

  <!-- ===== BASE (keyboard) ===== -->
  <!-- hinge shadow -->
  <rect x="18" y="570" width="924" height="4" fill="#AEAAA6"/>
  <!-- base body -->
  <rect x="0" y="572" width="960" height="52" rx="6" fill="url(#base)"/>
  <!-- top highlight -->
  <rect x="1" y="573" width="958" height="2" rx="1" fill="rgba(255,255,255,0.14)"/>
  <!-- keyboard recess -->
  <rect x="52" y="580" width="856" height="36" rx="4" fill="rgba(0,0,0,0.04)"/>
  <!-- trackpad -->
  <rect x="376" y="586" width="208" height="22" rx="6" fill="rgba(0,0,0,0.07)"/>
</svg>
