<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4A4A4A">
  <meta name="robots" content="noindex">
  <title>404 ページが見つかりません | A@Web Works</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234A4A4A'/%3E%3Cpolygon points='13,3 19,3 8,29 1,29' fill='white'/%3E%3Cpolygon points='13,3 19,3 31,29 24,29' fill='white'/%3E%3Ctext x='16' y='27' text-anchor='middle' font-size='10' font-style='italic' font-family='Georgia%2Cserif' fill='%23FF6F8F'%3Ea%3C%2Ftext%3E%3C%2Fsvg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF6F8F;
      --pink-light: #FFE8EF;
      --text: #2D2A30;
      --text-sub: #888;
      --bg: #FAF7F5;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3rem;
    }
    .logo__img {
      width: 28px;
      height: 31px;
      flex-shrink: 0;
      display: block;
    }
    .logo__name {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
    }
    .logo__text { font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif; font-size: 14px; font-weight: 600; line-height: 1.2; letter-spacing: .04em; white-space: nowrap; }
    .logo__sub  { font-size: 8px; font-weight: 400; opacity: .55; letter-spacing: .11em; text-transform: uppercase; line-height: 1.2; white-space: nowrap; }
    .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 600;
      color: var(--pink-light);
      line-height: 1;
      letter-spacing: -0.02em;
      position: relative;
    }
    .num::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--pink);
      opacity: 0.15;
    }
    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
      letter-spacing: 0.05em;
    }
    p {
      font-size: 0.9rem;
      color: var(--text-sub);
      line-height: 1.8;
    }
    .btn {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.85rem 2.5rem;
      background: var(--pink);
      color: #fff;
      text-decoration: none;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <img src="images/logo-mark.svg" alt="" class="logo__img" width="30" height="33" aria-hidden="true">
    <span class="logo__name">
      <span class="logo__text">A@Web Works</span>
      <span class="logo__sub">Web Design / AI / SNS</span>
    </span>
  </a>
  <div class="num">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動・削除されたか、<br>URLが間違っている可能性があります。</p>
  <a href="/" class="btn">トップページへ戻る</a>
</body>
</html>
