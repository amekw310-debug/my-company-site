<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- 背景 -->
  <rect width="600" height="600" fill="#EEF1F6"/>

  <!-- 空 -->
  <rect width="600" height="320" fill="#C8D8EC"/>

  <!-- 雲 -->
  <ellipse cx="120" cy="100" rx="70" ry="30" fill="white" opacity="0.85"/>
  <ellipse cx="160" cy="88" rx="50" ry="25" fill="white" opacity="0.85"/>
  <ellipse cx="80" cy="95" rx="40" ry="22" fill="white" opacity="0.85"/>

  <ellipse cx="440" cy="130" rx="60" ry="25" fill="white" opacity="0.75"/>
  <ellipse cx="480" cy="118" rx="45" ry="22" fill="white" opacity="0.75"/>
  <ellipse cx="400" cy="125" rx="35" ry="18" fill="white" opacity="0.75"/>

  <!-- 地面 -->
  <rect y="320" width="600" height="280" fill="#8FA87A"/>
  <rect y="380" width="600" height="220" fill="#7A9669"/>

  <!-- 道路 -->
  <rect x="200" y="350" width="200" height="250" fill="#6B7280"/>
  <rect x="293" y="350" width="14" height="250" fill="#F9FAFB" opacity="0.6" rx="4"/>

  <!-- メインビル 本体 -->
  <rect x="80" y="130" width="440" height="230" fill="#2B3A5C" rx="4"/>

  <!-- ビル 明るい面 -->
  <rect x="80" y="130" width="6" height="230" fill="#3D517A"/>
  <rect x="514" y="130" width="6" height="230" fill="#1E2D4A"/>

  <!-- 屋上パラペット -->
  <rect x="70" y="118" width="460" height="18" fill="#1E2D4A" rx="2"/>

  <!-- 会社ロゴエリア -->
  <rect x="200" y="148" width="200" height="48" fill="#1A2640" rx="4"/>
  <text x="300" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#C8D400" letter-spacing="2">長縄工務店</text>

  <!-- 窓 3階 -->
  <rect x="100" y="152" width="52" height="36" fill="#6B9DB5" rx="2" opacity="0.9"/>
  <rect x="164" y="152" width="20" height="36" fill="#4A7A9A" rx="2" opacity="0.7"/>
  <!-- spacer -->
  <rect x="420" y="152" width="52" height="36" fill="#6B9DB5" rx="2" opacity="0.9"/>
  <rect x="484" y="152" width="20" height="36" fill="#4A7A9A" rx="2" opacity="0.7"/>

  <!-- 窓 2階 -->
  <rect x="100" y="206" width="52" height="36" fill="#6B9DB5" rx="2" opacity="0.9"/>
  <rect x="164" y="206" width="20" height="36" fill="#4A7A9A" rx="2" opacity="0.7"/>
  <rect x="420" y="206" width="52" height="36" fill="#6B9DB5" rx="2" opacity="0.9"/>
  <rect x="484" y="206" width="20" height="36" fill="#4A7A9A" rx="2" opacity="0.7"/>

  <!-- 窓 1階 -->
  <rect x="100" y="260" width="52" height="36" fill="#7BAFC6" rx="2" opacity="0.9"/>
  <rect x="164" y="260" width="20" height="36" fill="#5A8AAA" rx="2" opacity="0.7"/>
  <rect x="420" y="260" width="52" height="36" fill="#7BAFC6" rx="2" opacity="0.9"/>
  <rect x="484" y="260" width="20" height="36" fill="#5A8AAA" rx="2" opacity="0.7"/>

  <!-- エントランス -->
  <rect x="234" y="240" width="132" height="120" fill="#1A2640" rx="2"/>
  <!-- ガラス扉 -->
  <rect x="250" y="260" width="44" height="100" fill="#4A8BAA" rx="2" opacity="0.8"/>
  <rect x="306" y="260" width="44" height="100" fill="#4A8BAA" rx="2" opacity="0.8"/>
  <!-- ドアハンドル -->
  <line x1="291" y1="310" x2="297" y2="310" stroke="#C8D400" stroke-width="3" stroke-linecap="round"/>
  <line x1="303" y1="310" x2="309" y2="310" stroke="#C8D400" stroke-width="3" stroke-linecap="round"/>

  <!-- 庇 (エントランス庇) -->
  <rect x="218" y="236" width="164" height="10" fill="#C8D400" rx="2"/>

  <!-- 植栽 左 -->
  <rect x="90" y="340" width="20" height="30" fill="#4A6340"/>
  <ellipse cx="100" cy="335" rx="28" ry="25" fill="#5A7A50"/>
  <ellipse cx="86" cy="345" rx="18" ry="16" fill="#4E6E44"/>

  <!-- 植栽 右 -->
  <rect x="490" y="340" width="20" height="30" fill="#4A6340"/>
  <ellipse cx="500" cy="335" rx="28" ry="25" fill="#5A7A50"/>
  <ellipse cx="514" cy="345" rx="18" ry="16" fill="#4E6E44"/>

  <!-- フェンス/縁石 -->
  <rect x="60" y="368" width="480" height="8" fill="#9CA3AF" rx="2"/>

  <!-- 看板ポール -->
  <rect x="148" y="310" width="6" height="60" fill="#374151"/>
  <rect x="132" y="298" width="38" height="20" fill="#1A2640" rx="2"/>
  <text x="151" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C8D400">株式会社</text>

  <!-- 影 -->
  <ellipse cx="300" cy="368" rx="240" ry="8" fill="#1A2640" opacity="0.12"/>
</svg>
